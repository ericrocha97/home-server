---
- name: Configure K3s Server
  hosts: server
  become: yes
  vars:
    k3s_node_ip: "{{ lookup('env', 'SERVER_LAN_IP') | default(ansible_host, true) }}"
  roles:
    - role: xanmanning.k3s
      vars:
        ansible_become: true
        k3s_state: installed
        k3s_server_init: true
        k3s_install_hard_links: true
        k3s_become: true
        k3s_use_experimental: false
        k3s_use_flags:
          - server
        k3s_server_options:
          node-ip: "{{ k3s_node_ip }}"
          flannel-iface: "enp9s0"
          node-external-ip: "{{ k3s_node_ip }}"
