---
- name: Deploy aplicações no k3s
  hosts: server
  become: yes
  vars:
    helm_version: "v3.18.5"
    helm_bin: /usr/local/bin/helm
    k8s_manifests_root: "{{ playbook_dir | dirname }}/k8s"
    local_tls_cert_path: "{{ playbook_dir }}/secrets/local-home-arpa-tls.crt"
    local_tls_key_path: "{{ playbook_dir }}/secrets/local-home-arpa-tls.key"
    local_portainer_agent_secret_path: "{{ playbook_dir }}/secrets/portainer-agent-secret.txt"
    docker_host_agent_bind_ip: "192.168.100.113"
    docker_host_agent_port: "9001"
    docker_host_agent_container_name: "portainer_agent"
    docker_host_agent_image: "portainer/agent:2.39.1"
    # Diretório destino no host remoto (sem precisar de sudo)
    remote_k8s_root: "/home/{{ ansible_user }}/k8s-manifests"
    kubeconfig_path: "/etc/rancher/k3s/k3s.yaml"
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Garantir dependências base (curl, tar)
      apt:
        name: [curl, tar]
        state: present
        update_cache: yes

    - name: Instalar dependências Python via APT (kubernetes.core)
      apt:
        name:
          - python3-kubernetes
          - python3-yaml
          - python3-requests
        state: present
        update_cache: yes

    - name: Verificar se secret Grafana real existe (local)
      stat:
        path: "{{ k8s_manifests_root }}/secrets/grafana-admin-secret.yaml"
      register: grafana_secret_file
      delegate_to: localhost
      run_once: true
      become: false

    - name: Falhar se secret Grafana não existir (local)
      fail:
        msg: "Arquivo grafana-admin-secret.yaml não encontrado. Copie o exemplo e defina uma senha."
      when: not grafana_secret_file.stat.exists
      delegate_to: localhost
      run_once: true
      become: false

    - name: Verificar se secret Portainer real existe (local)
      stat:
        path: "{{ k8s_manifests_root }}/secrets/portainer-admin-password-secret.yaml"
      register: portainer_secret_file
      delegate_to: localhost
      run_once: true
      become: false

    - name: Falhar se secret Portainer não existir (local)
      fail:
        msg: "Arquivo portainer-admin-password-secret.yaml não encontrado. Copie o exemplo e defina uma senha."
      when: not portainer_secret_file.stat.exists
      delegate_to: localhost
      run_once: true
      become: false

    - name: Verificar se certificado TLS local existe (local)
      stat:
        path: "{{ local_tls_cert_path }}"
      register: tls_cert_file
      delegate_to: localhost
      run_once: true
      become: false

    - name: Falhar se certificado TLS local não existir
      fail:
        msg: "Arquivo local-home-arpa-tls.crt não encontrado em ansible/secrets/."
      when: not tls_cert_file.stat.exists
      delegate_to: localhost
      run_once: true
      become: false

    - name: Verificar se chave TLS local existe (local)
      stat:
        path: "{{ local_tls_key_path }}"
      register: tls_key_file
      delegate_to: localhost
      run_once: true
      become: false

    - name: Falhar se chave TLS local não existir
      fail:
        msg: "Arquivo local-home-arpa-tls.key não encontrado em ansible/secrets/."
      when: not tls_key_file.stat.exists
      delegate_to: localhost
      run_once: true
      become: false

    - name: Verificar se AGENT_SECRET do Portainer existe (local)
      stat:
        path: "{{ local_portainer_agent_secret_path }}"
      register: portainer_agent_secret_file
      delegate_to: localhost
      run_once: true
      become: false

    - name: Falhar se AGENT_SECRET do Portainer não existir
      fail:
        msg: "Arquivo portainer-agent-secret.txt não encontrado em ansible/secrets/."
      when: not portainer_agent_secret_file.stat.exists
      delegate_to: localhost
      run_once: true
      become: false

    - name: Criar diretório remoto para manifests (como usuário normal)
      file:
        path: "{{ remote_k8s_root }}"
        state: directory
        mode: '0755'
      become: false

    - name: Copiar árvore de manifests k8s
      copy:
        src: "{{ k8s_manifests_root }}/"
        dest: "{{ remote_k8s_root }}/"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
        directory_mode: '0755'
      become: false

    - name: Criar diretório .kube para usuário
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'

    - name: Copiar kubeconfig k3s para ~/.kube/config (mantendo permissões restritas)
      copy:
        remote_src: true
        src: "{{ kubeconfig_path }}"
        dest: "/home/{{ ansible_user }}/.kube/config"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Usar kubeconfig copiado para operações (set_fact)
      set_fact:
        kubeconfig_path: "/home/{{ ansible_user }}/.kube/config"

    - name: Garantir namespace monitoring existe (antes dos secrets)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: v1
        kind: Namespace
        name: monitoring
        state: present

    - name: Garantir namespace tools existe (antes do secret Portainer)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: v1
        kind: Namespace
        name: tools
        state: present

    - name: Aplicar Secret Grafana
      kubernetes.core.k8s:
        state: present
        src: "{{ remote_k8s_root }}/secrets/grafana-admin-secret.yaml"
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Aplicar Secret Portainer
      kubernetes.core.k8s:
        state: present
        src: "{{ remote_k8s_root }}/secrets/portainer-admin-password-secret.yaml"
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Aplicar secret AGENT_SECRET do Portainer em tools e portainer
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: portainer-agent-secret
            namespace: "{{ item }}"
          type: Opaque
          data:
            AGENT_SECRET: "{{ lookup('file', local_portainer_agent_secret_path) | trim | b64encode }}"
      loop:
        - tools
        - portainer

    - name: Aplicar secret TLS local home.arpa em tools e monitoring
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: local-home-arpa-tls
            namespace: "{{ item }}"
          type: kubernetes.io/tls
          data:
            tls.crt: "{{ lookup('file', local_tls_cert_path) | b64encode }}"
            tls.key: "{{ lookup('file', local_tls_key_path) | b64encode }}"
      loop:
        - tools
        - monitoring

    - name: Instalar Helm se não existir
      shell: |
        curl -fsSL https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz -o /tmp/helm.tgz
        tar -C /tmp -xzf /tmp/helm.tgz
        install -m 0755 /tmp/linux-amd64/helm {{ helm_bin }}
      args:
        creates: "{{ helm_bin }}"
        executable: /bin/bash

    - name: Adicionar repositórios Helm prometheus & grafana
      shell: |
        {{ helm_bin }} repo add prometheus-community https://prometheus-community.github.io/helm-charts || true
        {{ helm_bin }} repo add grafana https://grafana.github.io/helm-charts || true
        {{ helm_bin }} repo update
      changed_when: false

    - name: Instalar/Atualizar kube-prometheus-stack
      kubernetes.core.helm:
        name: monitoring
        chart_ref: prometheus-community/kube-prometheus-stack
        release_namespace: monitoring
        update_repo_cache: true
        values_files:
          - "{{ remote_k8s_root }}/monitoring/kube-prometheus-stack-values.yaml"
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Aplicar RBAC Portainer (ServiceAccount + ClusterRole)
      kubernetes.core.k8s:
        state: present
        src: "{{ remote_k8s_root }}/portainer/portainer-rbac.yaml"
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Remover ClusterRole legado portainer wildcard
      kubernetes.core.k8s:
        state: absent
        api_version: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: portainer
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Remover ClusterRoleBinding legado portainer wildcard
      kubernetes.core.k8s:
        state: absent
        api_version: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: portainer
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Aplicar Portainer manifests
      kubernetes.core.k8s:
        state: present
        src: "{{ remote_k8s_root }}/portainer/portainer-deployment.yaml"
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Aplicar cAdvisor DaemonSet (opcional)
      kubernetes.core.k8s:
        state: present
        src: "{{ remote_k8s_root }}/monitoring/cadvisor-daemonset.yaml"
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Remover container Docker legado do Portainer Agent (sem hardening)
      community.docker.docker_container:
        name: "{{ docker_host_agent_container_name }}"
        state: absent

    - name: Subir Portainer Agent Docker no host com hardening
      community.docker.docker_container:
        name: "{{ docker_host_agent_container_name }}"
        image: "{{ docker_host_agent_image }}"
        pull: true
        restart_policy: always
        state: started
        published_ports:
          - "{{ docker_host_agent_bind_ip }}:{{ docker_host_agent_port }}:9001"
        env:
          AGENT_SECRET: "{{ lookup('file', local_portainer_agent_secret_path) | trim }}"
        security_opts:
          - no-new-privileges:true
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - /var/lib/docker/volumes:/var/lib/docker/volumes

    - name: Aplicar external services (host apps)
      kubernetes.core.k8s:
        state: present
        src: "{{ item }}"
        kubeconfig: "{{ kubeconfig_path }}"
      loop:
        - "{{ remote_k8s_root }}/external-services/casaos.yaml"
        - "{{ remote_k8s_root }}/external-services/jenkins.yaml"
        - "{{ remote_k8s_root }}/external-services/metabase.yaml"
        - "{{ remote_k8s_root }}/external-services/n8n.yaml"

    - name: Aplicar ingress tools com TLS
      kubernetes.core.k8s:
        state: present
        src: "{{ remote_k8s_root }}/ingress/tools-ingress.yaml"
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Aplicar ingress monitoring com TLS
      kubernetes.core.k8s:
        state: present
        src: "{{ remote_k8s_root }}/ingress/monitoring-ingress.yaml"
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Verificar se namespace casaos ainda existe (legado)
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: v1
        kind: Namespace
        name: casaos
      register: casaos_namespace_info

    - name: Remover ingress legado grafana.local
      kubernetes.core.k8s:
        state: absent
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: networking.k8s.io/v1
        kind: Ingress
        name: grafana-ingress
        namespace: monitoring

    - name: Remover ingress legado casaos.local
      kubernetes.core.k8s:
        state: absent
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: networking.k8s.io/v1
        kind: Ingress
        name: casaos-ingress
        namespace: casaos
      when: casaos_namespace_info.resources | length > 0

    - name: Remover Service legado casaos-service no namespace casaos
      kubernetes.core.k8s:
        state: absent
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: v1
        kind: Service
        name: casaos-service
        namespace: casaos
      when: casaos_namespace_info.resources | length > 0

    - name: Remover Endpoints legado casaos-service no namespace casaos
      kubernetes.core.k8s:
        state: absent
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: v1
        kind: Endpoints
        name: casaos-service
        namespace: casaos
      when: casaos_namespace_info.resources | length > 0

    - name: Mostrar serviços NodePorts
      shell: kubectl get svc -A | grep -E '30900'
      register: nodeports
      changed_when: false

    - debug:
        var: nodeports.stdout_lines
